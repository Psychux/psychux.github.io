<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVS - Familiarisation</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background-color: #fafafa;
      color: #222;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    h1 {
      font-size: 1.6rem;
      text-align: center;
      margin-bottom: 10px;
    }

    video {
      width: 100%;
      max-width: 900px;
      border-radius: 8px;
      background-color: #000;
    }

    .commandes {
      width: 100%;
      max-width: 1200px;
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: center;
    }

    .commandes img {
      width: 33%;
      max-width: 380px;
      height: 200px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #ddd;
      background-color: white;
    }
  </style>
</head>

<body>
  <main>
    <h1>Phase de familiarisation</h1>

    <video controls>
      <source src="../assets/videos/p0_ivs.mp4" type="video/mp4" />
      Votre navigateur ne permet pas de lire cette vidéo.
    </video>

    <div class="commandes">
      <img src="../assets/images/clavier_mouvements.png" alt="Rappel des commandes clavier pour les mouvements" />
      <img src="../assets/images/clavier_interaction.png" alt="Rappel des commandes clavier pour les interactions" />
      <img src="../assets/images/souris_interaction.png" alt="Rappel des commandes souris pour les interactions" />
    </div>
  </main>
</body>
</html>
