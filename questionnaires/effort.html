<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Évaluation de la phase</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body>
  <main>
    <h1>Évaluation de la phase</h1>

    <section class="card">
      <p id="infosParticipant"></p>

      <div class="consent-text">
        <p>
          Répondez aux deux questions suivantes en fonction de la phase de jeu que vous venez de réaliser.
        </p>
      </div>

      <form id="formEvaluationPhase">
        <div class="range-container">
          <label for="effortMental">
            Dans quelle mesure cette phase de jeu vous a-t-elle demandé un effort mental ?
          </label>

          <input
            id="effortMental"
            type="range"
            min="0"
            max="100"
            step="1"
            value="50"
          />

          <div class="range-labels">
            <span>Extrêmement faible</span>
            <span>Extrêmement élevé</span>
          </div>

          <div class="range-value">
            Valeur sélectionnée : <span id="valeurEffort">50</span>
          </div>
        </div>

        <div class="range-container">
          <label for="plaisir">
            Dans quelle mesure cette phase de jeu vous a-t-elle procuré du plaisir ?
          </label>

          <input
            id="plaisir"
            type="range"
            min="0"
            max="100"
            step="1"
            value="50"
          />

          <div class="range-labels">
            <span>Extrêmement faible</span>
            <span>Extrêmement élevé</span>
          </div>

          <div class="range-value">
            Valeur sélectionnée : <span id="valeurPlaisir">50</span>
          </div>
        </div>

        <button type="button" id="boutonContinuer" class="success">
          Continuer
        </button>

        <div id="messageErreur" class="message warning"></div>
      </form>
    </section>
  </main>

  <script src="../assets/js/questionnaires.js"></script>

  <script>
    const startTime = new Date();

    if (verifierSessionParticipant()) {
      afficherInfosParticipant("infosParticipant", false);

      const phase = getPhaseFromUrl("");

      if (!phase) {
        showError("Erreur : aucune phase n’est indiquée. Veuillez appeler l’expérimentateur.");
      }

      const effortInput = document.getElementById("effortMental");
      const plaisirInput = document.getElementById("plaisir");

      const valeurEffort = document.getElementById("valeurEffort");
      const valeurPlaisir = document.getElementById("valeurPlaisir");

      effortInput.addEventListener("input", function () {
        valeurEffort.textContent = effortInput.value;
      });

      plaisirInput.addEventListener("input", function () {
        valeurPlaisir.textContent = plaisirInput.value;
      });

      document.getElementById("boutonContinuer").addEventListener("click", function () {
        if (!phase) {
          showError("Erreur : aucune phase n’est indiquée. Veuillez appeler l’expérimentateur.");
          return;
        }

        const effortMental = requireRangeValue(
          "effortMental",
          "Veuillez indiquer l’effort mental fourni avant de continuer."
        );

        if (effortMental === null) {
          return;
        }

        const plaisir = requireRangeValue(
          "plaisir",
          "Veuillez indiquer le plaisir ressenti avant de continuer."
        );

        if (plaisir === null) {
          return;
        }

        saveEvaluationPhaseResponse({
          phase: phase,
          startTime: startTime,
          effortMental: effortMental,
          plaisir: plaisir
        });

        goToNextPhaseAfterEffort(phase);
      });
    }
  </script>
</body>
</html>
